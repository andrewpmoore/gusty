name: Fetch Weather Data

on:
  push:
    branches:
      - main
    paths:
      - 'fetch_weather_data.py'
      - 'consensus_pipeline.py'
      - 'extract_station_forecasts.py'
      - 'publish_r2.py'
      - '.github/workflows/fetch_data.yml'
  schedule:
    - cron: '30 4,10,16,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gusty-data-deploy
  cancel-in-progress: false

jobs:
  update-weather:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: |
          pip install requests xarray cfgrib numpy scipy argparse boto3

      - name: Restore Consensus State from R2
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          mkdir -p .consensus_state
          aws s3 cp \
            "s3://${R2_BUCKET}/state/weights.json" \
            .consensus_state/weights.json \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Run Fetch Script
        env:
          CONSENSUS_WEIGHTS_FILE: .consensus_state/weights.json
        run: |
          # This script cleans public/data locally and then fills it with new JSONs
          python fetch_weather_data.py --type all

      - name: Publish Versioned Forecast to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python publish_r2.py --source public/data --dataset forecast \
            --run "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" --bucket "$R2_BUCKET"
