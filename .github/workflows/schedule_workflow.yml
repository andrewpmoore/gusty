name: Publish City Weather to R2

on:
  push:
    branches: [main]
    paths:
      - city.py
      - publish_r2.py
      - .github/workflows/schedule_workflow.yml
  schedule:
    - cron: '0 1,13 * * *'  # Schedule to run every day at 1 am and 1pm
  workflow_dispatch:

jobs:
  run-script-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository with Limited History
        uses: actions/checkout@v2
        with:
          ref: main
          fetch-depth: 3  # Set the number of commits to fetch

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8  # Change this to your Python version if needed

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt boto3

      - name: Run City Script
        run: python city.py locations.txt

      - name: Prepare City Data
        run: |
          mkdir -p city_payload
          mv world_weather.json city_payload/world_weather.json

      - name: Publish Versioned City Data to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python publish_r2.py --source city_payload --dataset cities \
            --run "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" --bucket "$R2_BUCKET"
