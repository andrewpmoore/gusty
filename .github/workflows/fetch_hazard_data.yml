name: Fetch Hazard Data

on:
  push:
    branches:
      - main
    paths:
      - 'fetch_hazard_data.py'
      - '.github/workflows/fetch_hazard_data.yml'
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gusty-data-deploy
  cancel-in-progress: false

jobs:
  update-hazards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: pip install requests boto3

      - name: Restore Previous Hazard Run
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp "s3://${R2_BUCKET}/hazards/current.json" hazard-current.json --endpoint-url "$endpoint"
          prefix="$(jq -r .run hazard-current.json)"
          aws s3 sync "s3://${R2_BUCKET}/hazards/${prefix}" previous_hazards --endpoint-url "$endpoint"

      - name: Fetch Hazard Layers
        env:
          GUSTY_PREVIOUS_DATA_DIR: previous_hazards
          GUSTY_USER_AGENT: "GustyWeather/1.0 (https://gustyweather.com; weather-data-ingestion)"
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          METEOALARM_FEEDS: ${{ vars.METEOALARM_FEEDS }}
          BOM_ALERTS_GEOJSON_URL: ${{ vars.BOM_ALERTS_GEOJSON_URL }}
          BRAZIL_INMET_ALERTS_GEOJSON_URL: ${{ vars.BRAZIL_INMET_ALERTS_GEOJSON_URL }}
          ARGENTINA_SMN_ALERTS_GEOJSON_URL: ${{ vars.ARGENTINA_SMN_ALERTS_GEOJSON_URL }}
          INDIA_IMD_ALERTS_GEOJSON_URL: ${{ vars.INDIA_IMD_ALERTS_GEOJSON_URL }}
          PAGASA_ALERTS_GEOJSON_URL: ${{ vars.PAGASA_ALERTS_GEOJSON_URL }}
          FIJI_RSMC_ALERTS_GEOJSON_URL: ${{ vars.FIJI_RSMC_ALERTS_GEOJSON_URL }}
          JTWC_ALERTS_GEOJSON_URL: ${{ vars.JTWC_ALERTS_GEOJSON_URL }}
        # The output of this script is redirected to /dev/null to prevent log bloat
        run: python fetch_hazard_data.py --previous-dir previous_hazards > /dev/null 2>&1

      - name: Publish Versioned Hazards to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          mkdir -p hazard_payload
          cp -a public/data/hazards hazard_payload/hazards
          cp -a public/data/layers hazard_payload/layers
          python publish_r2.py --source hazard_payload --dataset hazards \
            --run "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" --bucket "$R2_BUCKET"
