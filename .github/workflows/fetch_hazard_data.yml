name: Fetch Hazard Data

on:
  push:
    branches:
      - main
    paths:
      - 'fetch_hazard_data.py'
      - '.github/workflows/fetch_hazard_data.yml'
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gusty-data-deploy
  cancel-in-progress: false

jobs:
  update-hazards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: pip install requests

      - name: Clone Data Repository
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_SECRET }}
        run: |
          git clone --depth 1 "https://x-access-token:${DATA_REPO_TOKEN}@github.com/andrewpmoore/gusty-data.git" gusty_data_repo || true

      - name: Fetch Hazard Layers
        env:
          GUSTY_PREVIOUS_DATA_DIR: gusty_data_repo
          GUSTY_USER_AGENT: "GustyWeather/1.0 (https://gustyweather.com; weather-data-ingestion)"
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          METEOALARM_FEEDS: ${{ vars.METEOALARM_FEEDS }}
          BOM_ALERTS_GEOJSON_URL: ${{ vars.BOM_ALERTS_GEOJSON_URL }}
          BRAZIL_INMET_ALERTS_GEOJSON_URL: ${{ vars.BRAZIL_INMET_ALERTS_GEOJSON_URL }}
          ARGENTINA_SMN_ALERTS_GEOJSON_URL: ${{ vars.ARGENTINA_SMN_ALERTS_GEOJSON_URL }}
          INDIA_IMD_ALERTS_GEOJSON_URL: ${{ vars.INDIA_IMD_ALERTS_GEOJSON_URL }}
          PAGASA_ALERTS_GEOJSON_URL: ${{ vars.PAGASA_ALERTS_GEOJSON_URL }}
          FIJI_RSMC_ALERTS_GEOJSON_URL: ${{ vars.FIJI_RSMC_ALERTS_GEOJSON_URL }}
          JTWC_ALERTS_GEOJSON_URL: ${{ vars.JTWC_ALERTS_GEOJSON_URL }}
        run: python fetch_hazard_data.py --previous-dir gusty_data_repo --print-summary

      - name: Deploy Hazard Data
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_SECRET }}
        run: |
          cd gusty_data_repo
          
          if [ ! -d ".git" ]; then
            git init
            git branch -M main
            echo "Init" > init.txt
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf hazards layers
          cp -a ../public/data/hazards ./hazards
          cp -a ../public/data/layers ./layers
          
          git add .
          git commit --allow-empty -m "Latest Hazard Data: $(date -u)"
          
          for attempt in 1 2 3; do
            if git push "https://x-access-token:${DATA_REPO_TOKEN}@github.com/andrewpmoore/gusty-data.git" main --force; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
