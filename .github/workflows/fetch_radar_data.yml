name: Fetch Radar Data

on:
  push:
    branches:
      - main
    paths:
      - 'fetch_radar_data.py'
      - 'radar_providers.example.json'
      - 'requirements.txt'
      - '.github/workflows/fetch_radar_data.yml'
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gusty-data-deploy
  cancel-in-progress: false

jobs:
  update-radar-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: pip install -r requirements.txt

      - name: Fetch Radar Data
        env:
          GUSTY_USER_AGENT: "GustyWeather/1.0 (https://gustyweather.com; weather-radar-ingestion)"
          UK_RADAR_IMAGE_URL: ${{ vars.UK_RADAR_IMAGE_URL }}
          UK_RADAR_IMAGE_BOUNDS: ${{ vars.UK_RADAR_IMAGE_BOUNDS }}
          UK_RADAR_INDEX_VALUES: ${{ vars.UK_RADAR_INDEX_VALUES }}
          UK_RADAR_UNITS: ${{ vars.UK_RADAR_UNITS }}
          UK_RADAR_REF_TIME: ${{ vars.UK_RADAR_REF_TIME }}
          UK_RADAR_SOURCE_URL: ${{ vars.UK_RADAR_SOURCE_URL }}
          UK_RADAR_ATTRIBUTION: ${{ vars.UK_RADAR_ATTRIBUTION }}
          RADAR_PROVIDERS_JSON: ${{ vars.RADAR_PROVIDERS_JSON }}
          RADAR_TARGET_DEGREES: ${{ vars.RADAR_TARGET_DEGREES }}
          MRMS_TARGET_DEGREES: ${{ vars.MRMS_TARGET_DEGREES }}
          RADAR_MIN_VALUE: ${{ vars.RADAR_MIN_VALUE }}
        run: python fetch_radar_data.py --print-summary

      - name: Deploy Radar Data
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_SECRET }}
        run: |
          git clone --depth 1 "https://x-access-token:${DATA_REPO_TOKEN}@github.com/andrewpmoore/gusty-data.git" latest_data || true
          rm -rf latest_data/.git
          mkdir deploy_staging
          cd deploy_staging
          git init
          git branch -M main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d "../latest_data" ]; then
            cp -a ../latest_data/. .
          else
            echo "Init" > init.txt
          fi

          mkdir -p layers
          rm -rf radar radar_vectors
          cp -a ../public/data/radar ./radar
          cp -a ../public/data/radar_vectors ./radar_vectors
          cp -a ../public/data/layers/radar_layers.json ./layers/radar_layers.json
          cp -a ../public/data/layers/radar_vector_layers.json ./layers/radar_vector_layers.json
          git add .
          git commit --allow-empty -m "Latest Radar Data: $(date -u)"
          for attempt in 1 2 3; do
            if git push "https://x-access-token:${DATA_REPO_TOKEN}@github.com/andrewpmoore/gusty-data.git" main --force; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
