name: Fetch Radar Data

on:
  push:
    branches:
      - main
    paths:
      - 'fetch_radar_data.py'
      - 'radar_providers.example.json'
      - 'requirements.txt'
      - '.github/workflows/fetch_radar_data.yml'
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gusty-data-deploy
  cancel-in-progress: false

jobs:
  update-radar-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev

      - name: Install Python Libraries
        run: pip install -r requirements.txt

      - name: Fetch Radar Data
        env:
          GUSTY_USER_AGENT: ${{ vars.GUSTY_USER_AGENT || 'GustyWeather/1.0 (https://gustyweather.com; weather-radar-ingestion)' }}
          RADAR_PROVIDERS_JSON: ${{ vars.RADAR_PROVIDERS_JSON }}
          RADAR_TARGET_DEGREES: ${{ vars.RADAR_TARGET_DEGREES }}
          RADAR_MIN_VALUE: ${{ vars.RADAR_MIN_VALUE }}
          RADAR_NOISE_FLOOR_MM_H: ${{ vars.RADAR_NOISE_FLOOR_MM_H }}
          RADAR_EDGE_THRESHOLD_MM_H: ${{ vars.RADAR_EDGE_THRESHOLD_MM_H }}
          RADAR_ENABLE_GLOBAL_MODEL_FALLBACK: ${{ vars.RADAR_ENABLE_GLOBAL_MODEL_FALLBACK || 'true' }}
          NOAA_GFS_FORECAST_HOURS: ${{ vars.NOAA_GFS_FORECAST_HOURS || '0,1,2' }}
          METOFFICE_DATAHUB_API_KEY: ${{ secrets.METOFFICE_DATAHUB_API_KEY }}
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          METEOFRANCE_API_KEY: ${{ secrets.METEOFRANCE_API_KEY }}
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
          EUMETSAT_CONSUMER_KEY: ${{ secrets.EUMETSAT_CONSUMER_KEY }}
          EUMETSAT_CONSUMER_SECRET: ${{ secrets.EUMETSAT_CONSUMER_SECRET }}
        run: python fetch_radar_data.py --print-summary

      - name: Deploy Radar Data
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_SECRET }}
        run: |
          git clone --depth 1 "https://x-access-token:${DATA_REPO_TOKEN}@github.com/andrewpmoore/gusty-data.git" latest_data || true
          rm -rf latest_data/.git
          mkdir deploy_staging
          cd deploy_staging
          git init
          git branch -M main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d "../latest_data" ]; then
            cp -a ../latest_data/. .
          else
            echo "Init" > init.txt
          fi

          mkdir -p layers
          rm -rf radar radar_vectors radar_rain_rate radar_snow_rate radar_mixed_rate radar_precip_rate
          cp -a ../public/data/radar ./radar
          cp -a ../public/data/radar_vectors ./radar_vectors
          cp -a ../public/data/radar_rain_rate ./radar_rain_rate
          cp -a ../public/data/radar_snow_rate ./radar_snow_rate
          cp -a ../public/data/radar_mixed_rate ./radar_mixed_rate
          cp -a ../public/data/radar_precip_rate ./radar_precip_rate
          cp -a ../public/data/layers/radar_layers.json ./layers/radar_layers.json
          cp -a ../public/data/layers/radar_vector_layers.json ./layers/radar_vector_layers.json
          git add .
          git commit --allow-empty -m "Latest Radar Data: $(date -u)"
          for attempt in 1 2 3; do
            if git push "https://x-access-token:${DATA_REPO_TOKEN}@github.com/andrewpmoore/gusty-data.git" main --force; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
