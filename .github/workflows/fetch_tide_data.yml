name: Fetch Tide Data

on:
  push:
    branches:
      - main
    paths:
      - 'fetch_tides.py'
      - 'publish_r2.py'
      - 'tides/**'
      - '.github/workflows/fetch_tide_data.yml'
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gusty-tide-build
  cancel-in-progress: true

env:
  R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  update-tides:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tides/package-lock.json

      - name: Install Tide Dependencies
        working-directory: tides
        run: npm ci

      - name: Generate Tide Data
        run: python3 fetch_tides.py --days 45 --print-summary
        env:
          # Testing mode: include non-commercial and non-quality-accepted
          # stations so coverage can be inspected in-app.
          #
          # Production switch:
          #   TIDES_INCLUDE_NON_COMMERCIAL: 'false'
          #   TIDES_INCLUDE_ALL_QUALITY: 'false'
          TIDES_INCLUDE_NON_COMMERCIAL: 'true'
          TIDES_INCLUDE_ALL_QUALITY: 'true'

      - name: Publish versioned tide data to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          pip install boto3
          python publish_r2.py --source public/data/tides --dataset tides \
            --run "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" --bucket "$R2_BUCKET"
