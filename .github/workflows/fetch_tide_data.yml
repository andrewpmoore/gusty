name: Fetch Tide Data

on:
  push:
    branches:
      - main
    paths:
      - 'fetch_tides.py'
      - 'tides/**'
      - '.github/workflows/fetch_tide_data.yml'
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gusty-data-deploy
  cancel-in-progress: false

jobs:
  update-tides:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tides/package-lock.json

      - name: Install Tide Dependencies
        working-directory: tides
        run: npm ci

      - name: Generate Tide Data
        run: python3 fetch_tides.py --days 45 --print-summary
        env:
          # Testing mode: include non-commercial and non-quality-accepted
          # stations so coverage can be inspected in-app.
          #
          # Production switch:
          #   TIDES_INCLUDE_NON_COMMERCIAL: 'false'
          #   TIDES_INCLUDE_ALL_QUALITY: 'false'
          TIDES_INCLUDE_NON_COMMERCIAL: 'true'
          TIDES_INCLUDE_ALL_QUALITY: 'true'

      - name: Deploy Tide Data
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_SECRET }}
        run: |
          git clone --depth 1 "https://x-access-token:${DATA_REPO_TOKEN}@github.com/andrewpmoore/gusty-data.git" latest_data || true
          rm -rf latest_data/.git

          mkdir deploy_staging
          cd deploy_staging
          git init
          git branch -M main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d "../latest_data" ]; then
            cp -a ../latest_data/. .
          else
            echo "Init" > init.txt
          fi

          rm -rf tides
          cp -a ../public/data/tides ./tides
          git add .
          git commit --allow-empty -m "Latest Tide Data: $(date -u)"

          for attempt in 1 2 3; do
            if git push "https://x-access-token:${DATA_REPO_TOKEN}@github.com/andrewpmoore/gusty-data.git" main --force; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
